[env]
TERM = "xterm-256color"

[font]
size = 15.0

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[general]
import = ["~/.config/alacritty/catppuccin-mocha.toml"]

[window]
decorations = "none"

[cursor]
style.shape = "Beam"

[mouse]
hide_when_typing = true

# shift+enter -> ESC + CR (matches ghostty keybind)
[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001b\r"
